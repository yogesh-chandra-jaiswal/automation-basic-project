# ==================================================================
# AUTOMATION BDD CONFIGURATION FILE
# ==================================================================

# ==================================================================
# APPLICATION CONFIGURATION
# ==================================================================
# Application URLs
app.url=https://www.saucedemo.com/
app.name=SauceDemo
app.version=1.0

# ==================================================================
# BROWSER CONFIGURATION
# ==================================================================
# Browser Type: chrome, edge, firefox
browser=chrome

# Browser Options
headless=false
disable.notifications=true
start.maximized=true

# ==================================================================
# WEBDRIVER TIMEOUTS (in seconds)
# ==================================================================
# Implicit Wait - Applied to all element searches
implicit.wait=10

# Explicit Wait - Used for specific wait conditions
explicit.wait=15

# Page Load Timeout - Wait for page to fully load
page.load.timeout=20

# ==================================================================
# TEST CREDENTIALS
# ==================================================================
# Username for login tests
username=standard_user

# Password for login tests
password=secret_sauce

# Alternative test users
locked_user=locked_out_user
problem_user=problem_user

# ==================================================================
# SCREENSHOT CONFIGURATION
# ==================================================================
# Enable/Disable screenshots on test failure
screenshot.on.failure=true

# Screenshot storage path
screenshot.path=target/screenshots/

# ==================================================================
# REPORTING CONFIGURATION
# ==================================================================
# Cucumber reports path
report.path=target/cucumber-reports/

# Cucumber HTML reports path
html.report.path=target/cucumber-html-reports/

# Extent reports enabled
extent.report.enabled=true
extent.report.path=target/extent-reports/

# ==================================================================
# LOGGING CONFIGURATION
# ==================================================================
# Log Level: DEBUG, INFO, WARN, ERROR, FATAL
log.level=INFO

# Log file path
log.file.path=target/logs/

# ==================================================================
# RETRY CONFIGURATION
# ==================================================================
# Enable/Disable test retry on failure
retry.enabled=false

# Number of retries for failed tests
retry.count=2

# ==================================================================
# PARALLEL EXECUTION CONFIGURATION
# ==================================================================
# Enable parallel execution
parallel.execution=true

# Number of parallel threads
parallel.threads=3

# ==================================================================
# DATABASE CONFIGURATION (Optional)
# ==================================================================
# db.driver=com.mysql.cj.jdbc.Driver
# db.url=jdbc:mysql://localhost:3306/automation_db
# db.username=root
# db.password=password

# ==================================================================
# API CONFIGURATION (Optional)
# ==================================================================
# api.base.url=https://api.example.com
# api.timeout=5000
# api.retry.count=3

# ==================================================================
# ENVIRONMENT CONFIGURATION
# ==================================================================
# Environment: dev, staging, production
environment=staging

# Proxy Settings (Optional)
# proxy.enabled=false
# proxy.host=
# proxy.port=

# ==================================================================
# END OF CONFIGURATION FILE
# ==================================================================
